services:
  postgres:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_DB: nvr
      POSTGRES_USER: nvr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nvr_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nvr -d nvr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    volumes:
      - redis_data:/data
    networks:
      - nvr_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /data/recordings:/data/recordings
      - /data/hls:/data/hls
      - /data/exports:/data/exports
      - /data/alerts:/data/alerts
      - /data/floor_plans:/data/floor_plans
      - /mnt/nvr_nas:/mnt/nvr_nas
      - ./secrets:/run/secrets:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nvr_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /data/recordings:/data/recordings
      - /data/exports:/data/exports
      - /data/alerts:/data/alerts
      - /mnt/nvr_nas:/mnt/nvr_nas
      - ./secrets:/run/secrets:ro
    networks:
      - nvr_net
    command: celery -A app.celery_app worker --loglevel=info --concurrency=8

  celery-beat:
    build: ./backend
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./secrets:/run/secrets:ro
    networks:
      - nvr_net
    command: celery -A app.celery_app beat --scheduler redbeat.RedBeatScheduler --loglevel=info

  keygen:
    build: ./backend
    profiles: ["tools"]
    volumes:
      - ./backend:/app
      - ./secrets:/run/secrets
    entrypoint: ["python", "scripts/generate_keys.py"]

  detection:
    build: ./detection_service
    env_file: .env
    depends_on:
      - redis
    volumes:
      - /data/alerts:/data/alerts
      - /data/models:/models
    networks:
      - nvr_net

  frontend:
    build: ./frontend
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - nvr_net

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /data/hls:/data/hls:ro
    networks:
      - nvr_net

volumes:
  postgres_data:
  redis_data:

networks:
  nvr_net:
    driver: bridge
